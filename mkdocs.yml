site_name: Eclipse Kura™ Apache ActiveMQ Artemis MQTT broker
site_url: 'https://eclipse-kura.github.io/kura/'

nav:
    - Simple Artemis MQTT Broker: simple-artemis-mqtt-broker.md
    - ActiveMQ Artemis MQTT Broker: active-mq-artemis-broker.md

theme:
  name: material
  logo: assets/kura_logo_small.png
  favicon: assets/favicon.png
  custom_dir: overrides
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top # enable the back-to-top button
    - announce.dismiss # enable custom announcements, they will dismiss by scrolling down

  icon:
    repo: fontawesome/brands/github # Alternate icon for repo link

# Repo link
repo_name: eclipse-kura/kura-artemis
repo_url: https://github.com/eclipse-kura/kura-artemis
edit_uri: "" # Remove edit button

plugins:
  - search
  - mkdocs-jupyter

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - footnotes

copyright: >
  Copyright &copy; Eclipse Foundation AISBL. All Rights Reserved. –
  <a href="#__consent"><b>Change cookie settings<b></a>

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/eclipse-kura/kura
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/eclipse/kura
  scope: "/kura/"
  analytics:
    provider: google
    property: G-B5KFDTHZMV
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/thumb-up-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/thumb-down-outline
          name: This page could be improved
          data: 0
          note: >- 
            Thanks for your feedback! Help us improve this page by
            using our <a href="https://github.com/eclipse-kura/kura/issues/new/?title=[Feedback]+{url}+-+" target="_blank" rel="noopener">feedback form</a>.
  consent:
    title: Cookie consent
    description: >- 
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
